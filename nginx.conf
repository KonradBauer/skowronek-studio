server {
    listen 80;
    server_name _;

    # Chunked upload chunks = max 10 MB, server actions = max 20 MB
    client_max_body_size 25m;

    location / {
        # "app" = nazwa serwisu w docker-compose (internal Docker DNS)
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Potrzebne dla długich uploadów i generowania ZIP-ów
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;
    }
}

# ──────────────────────────────────────
# HTTPS — gdy domena będzie gotowa:
# 1. Zatrzymaj nginx: docker compose stop nginx
# 2. Certbot standalone: certbot certonly --standalone -d skowronekstudio.pl
# 3. Odkomentuj blok poniżej i podmontuj certy jako volume w docker-compose.yml
# ──────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Chunked upload chunks = max 10 MB, server actions = max 20 MB
    client_max_body_size 25m;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;

        # WebSocket support (needed for Payload admin live updates)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long uploads and ZIP generation
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;

        # Disable buffering for streaming responses (video range requests)
        proxy_buffering off;
    }
}

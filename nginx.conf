# Nginx — reverse proxy dla PM2 app na porcie 3000
# Kopiuj do: /etc/nginx/sites-available/skowronekstudio
# Symlink:   ln -s /etc/nginx/sites-available/skowronekstudio /etc/nginx/sites-enabled/
# Reload:    nginx -t && systemctl reload nginx

server {
    listen 80;
    # Działa po IP i po domenie gdy przyjdzie
    server_name _;

    # Chunked upload chunks = max 10 MB, server actions = max 20 MB
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Potrzebne dla długich uploadów i generowania ZIP-ów
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;
    }
}

# ──────────────────────────────────────
# HTTPS — odkomentuj po certbot + zmień redirect w bloku HTTP
# 1. Certbot: certbot --nginx -d skowronekstudio.pl -d www.skowronekstudio.pl
# 2. Certbot uzupełni poniższy blok automatycznie
# ──────────────────────────────────────

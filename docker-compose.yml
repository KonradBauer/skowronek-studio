services:
  # ──────────────────────────────────────
  # Caddy - reverse proxy + auto SSL
  # ──────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - site

  # ──────────────────────────────────────
  # Skowronek Studio - skowronekstudio.pl
  # ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: skowronekstudio
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ${STORAGE_PATH:-/mnt/storage}/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d skowronekstudio"]
      interval: 5s
      timeout: 5s
      retries: 5

  site:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: https://skowronekstudio.pl
        NEXT_PUBLIC_SERVER_URL: https://skowronekstudio.pl
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URI: postgresql://payload:${DB_PASSWORD}@db:5432/skowronekstudio
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      CRON_SECRET: ${CRON_SECRET}
      NEXT_PUBLIC_SITE_URL: https://skowronekstudio.pl
      NEXT_PUBLIC_SERVER_URL: https://skowronekstudio.pl
      # SMTP
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      # Google Reviews (opcjonalnie)
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
    volumes:
      - ${STORAGE_PATH:-/mnt/storage}/uploads:/app/uploads

volumes:
  caddy_data:
  caddy_config:

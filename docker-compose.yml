services:
  # ──────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: skowronekstudio
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d skowronekstudio"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────
  # Schema migration (runs once before app)
  # ──────────────────────────────────────
  migrate:
    build:
      context: .
      target: migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URI: postgresql://payload:${DB_PASSWORD}@db:5432/skowronekstudio
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
    restart: "no"

  # ──────────────────────────────────────
  # Next.js + Payload CMS
  # ──────────────────────────────────────
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URI: postgresql://payload:${DB_PASSWORD}@db:5432/skowronekstudio
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"
      PAYLOAD_DB_PUSH: "false"
    volumes:
      - uploads:/app/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────
  # Nginx — reverse proxy
  # ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "1000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db_data:
  uploads:
